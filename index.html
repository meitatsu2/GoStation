<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gogoro Radar Pro v20.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Requirement: 14pt Font and Mobile Layout */
        * { font-size: 14pt; box-sizing: border-box; }
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 0; }

        .ribbon { 
            background: #2c3e50; height: 100px; display: flex; align-items: center; 
            padding: 0 10px; border-bottom: 2px solid #34495e; 
        }
        .menu-item { position: relative; }
        .menu-btn { background: none; border: none; color: white; padding: 10px; cursor: pointer; }
        .dropdown { 
            display: none; position: absolute; background: white; 
            min-width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; 
        }
        .dropdown button { color: black; padding: 15px; width: 100%; text-align: left; border: none; background: none; border-bottom: 1px solid #ddd; }
        .menu-item:hover .dropdown { display: block; }

        .stats-monitor { margin-left: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; overflow: hidden; }
        .row-green { color: #2ecc71; font-size: 11pt; line-height: 1.3; font-weight: bold; font-family: monospace; white-space: nowrap; }
        .row-red { color: #e74c3c; font-size: 11pt; line-height: 1.3; font-weight: bold; font-family: monospace; white-space: nowrap; }

        .control-aside { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; min-width: 90px; height: 100%; }
        #btnPause { 
            background: #f39c12; color: white; border: none; padding: 6px 10px; 
            border-radius: 4px; cursor: pointer; display: none; margin-top: 8px; font-size: 10pt; font-weight: bold;
        }

        .gps-status { display: flex; align-items: flex-end; gap: 3px; height: 16px; margin-bottom: 2px; }
        .bar { width: 4px; background: #555; border-radius: 1px; }
        .lvl4 .bar { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

        #radar-container { background: #000; position: relative; text-align: center; padding: 10px 0; border-bottom: 1px solid #333; }
        #radarCanvas { background: #000; border: 1px solid #333; }
        .hud-label { position: absolute; font-family: monospace; font-weight: bold; font-size: 11pt; pointer-events: none; }
        #scale-indicator { top: 15px; left: 15px; text-align: left; color: #fff; }
        #north-indicator { top: 15px; width: 100%; left: 0; text-align: center; color: #2ecc71; font-size: 14pt; }

        #accuracy-display { background: #000; color: #f1c40f; text-align: center; font-size: 10pt; padding: 5px 0; display: none; }
        .range-panel { background: #1a1a1a; padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        #rangeSelect { background: #2c3e50; color: white; border: 1px solid #34495e; padding: 8px; width: 85%; border-radius: 5px; }

        .controls { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; flex: 1; cursor: pointer; }
        #btnGo { background: #34495e; color: #7f8c8d; }
        #btnStop { background: #c0392b; color: white; display: none; }
        .ready { background: #2ecc71 !important; color: black !important; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>

    <div class="ribbon">
        <div class="menu-item">
            <button class="menu-btn">File ☰</button>
            <div class="dropdown">
                <button onclick="document.getElementById('xlsxIn').click()">Import XLSX Address List</button>
                <button onclick="document.getElementById('csvIn').click()">Import Processed Coordinates (CSV)</button>
                <button onclick="exportCSV()">Export Processed Coordinates (CSV)</button>
                <button onclick="exportFailures()">Export Failure Log (CSV)</button>
                <button onclick="clearAll()">Reset System</button>
            </div>
        </div>
        
        <div class="stats-monitor">
            <div class="row-green">SCAN: <span id="scan-val">0</span> / <span id="total-val">0</span></div>
            <div class="row-green">BUFF: <span id="buff-val">0</span></div>
            <div class="row-red">FAIL: <span id="fail-val">0</span></div>
        </div>

        <div class="control-aside">
            <div id="gps-ui" class="gps-status"><div class="bar bar1"></div><div class="bar bar2"></div><div class="bar bar3"></div><div class="bar bar4"></div></div>
            <button id="btnPause" onclick="togglePause()">PAUSE</button>
        </div>
    </div>

    <div id="radar-container">
        <div id="scale-indicator" class="hud-label">STEP: --m</div>
        <div id="north-indicator" class="hud-label">N</div>
        <canvas id="radarCanvas" width="320" height="320"></canvas>
    </div>

    <div id="accuracy-display">GPS Accuracy: ±--m</div>

    <div class="range-panel">
        <select id="rangeSelect" onchange="drawRadarFrame()">
            <option value="1000">1 km</option>
            <option value="2000">2 km</option>
            <option value="3000">3 km</option>
            <option value="5000" selected>5 km</option>
            <option value="10000">10 km</option>
            <option value="15000">15 km</option>
            <option value="20000">20 km</option>
        </select>
    </div>

    <div class="controls">
        <button id="btnGo" class="btn" onclick="startTracking()">GO</button>
        <button id="btnStop" class="btn" onclick="stopTracking()">STOP</button>
    </div>

    <input type="file" id="xlsxIn" hidden accept=".xlsx" onchange="handleXLSX(this)">
    <input type="file" id="csvIn" hidden accept=".csv, text/csv" onchange="handleCSV(this)">

    <table>
        <thead><tr><th>Station Name</th><th>Distance</th></tr></thead>
        <tbody id="list-body"></tbody>
    </table>

    <script>
        let gostations = [], failedLog = [], isPaused = false, resumeIndex = 1;
        let currentRows = [], currentIndices = { n: -1, a: -1 };
        let posHistory = [], lastVectorAngle = 0, myPos = null, watchID = null;
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');

        window.onload = () => {
            const saved = localStorage.getItem('gostation_db_v20_3');
            if (saved) { 
                gostations = JSON.parse(saved); 
                document.getElementById('btnGo').classList.add('ready'); 
                updateStats(0, 0, gostations.length, 0); 
            }
            drawRadarFrame();
        };

        function updateStats(s, t, b, f) {
            document.getElementById('scan-val').innerText = s;
            document.getElementById('total-val').innerText = t;
            document.getElementById('buff-val').innerText = b;
            document.getElementById('fail-val').innerText = f;
        }

        // --- REQUIREMENT 1 & 2: REFINED CLEANING LOGIC ---
        function cleanAddress(raw) {
            let str = String(raw).replace(/臺/g, "台");

            // 1. Neglect all enclosed by bracket
            str = str.replace(/[（(].*?[）)]/g, "");

            // 2. Neglect '里' and its prefixed characters after '鎮', '市' or '區'
            // Regex explanation: Look for Town/City/District, then find anything ending in '里' and remove it.
            // Using a look-behind style approach to ensure we don't kill the district name itself.
            str = str.replace(/([鎮市區])([^鎮市區]{1,5}里)/g, "$1");

            // 3. Neglect '鄰' and its prefixed number after markers
            str = str.replace(/([鎮市區里村])(\d+鄰)/g, "$1");

            // 4. Neglect the number right before '樓' and '樓' itself
            str = str.replace(/\d+樓/g, "");

            // 5. Neglect all after '號', '之', or ' 、'
            const markers = ['號', '之', ' 、'];
            let earliestIndex = str.length;
            let foundMarker = "";
            markers.forEach(m => {
                let idx = str.indexOf(m);
                if (idx !== -1 && idx < earliestIndex) {
                    earliestIndex = idx;
                    foundMarker = m;
                }
            });
            if (foundMarker !== "") {
                str = str.substring(0, earliestIndex + foundMarker.length);
            }

            return str.trim();
        }

        async function processRows() {
            const total = currentRows.length - 1;
            for (let i = resumeIndex; i < currentRows.length; i++) {
                if (isPaused) { resumeIndex = i; return; }
                const name = currentRows[i][currentIndices.n], raw = currentRows[i][currentIndices.a];
                if (!name || !raw || gostations.some(s => s.name === name)) {
                    updateStats(i, total, gostations.length, failedLog.length); continue;
                }
                
                let clean = cleanAddress(raw);
                let coords = await geocode(clean);
                
                if (!coords) {
                    let fallback = clean.replace(/\d+號/, "");
                    coords = await geocode(fallback);
                }

                if (coords) {
                    gostations.push({ name, lat: coords.lat, lon: coords.lon });
                    localStorage.setItem('gostation_db_v20_3', JSON.stringify(gostations));
                    document.getElementById('btnGo').classList.add('ready');
                } else {
                    failedLog.push({ name, address: raw, attempt: clean });
                }
                updateStats(i, total, gostations.length, failedLog.length);
                await new Promise(r => setTimeout(r, 1200)); 
            }
            document.getElementById('btnPause').style.display = 'none';
            exportFailures(true);
        }

        function drawRadarFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const center = canvas.width/2;
            const range = parseInt(document.getElementById('rangeSelect').value);
            const spacing = range / 5;
            document.getElementById('scale-indicator').innerText = `STEP: ${spacing}m`;
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1;
            for(let i=1; i<=5; i++) {
                ctx.beginPath(); ctx.arc(center, center, (center/5)*i, 0, Math.PI*2); ctx.stroke();
            }
            ctx.beginPath(); ctx.moveTo(center, 0); ctx.lineTo(center, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, center); ctx.lineTo(canvas.width, center); ctx.stroke();
            drawMovingVector(center);
        }

        function drawMovingVector(center) {
            let angle = lastVectorAngle;
            if (posHistory.length >= 2) {
                const now = posHistory[posHistory.length - 1], old = posHistory[0];
                if (now.lat !== old.lat || now.lon !== old.lon) {
                    angle = Math.atan2(now.lon - old.lon, now.lat - old.lat);
                    lastVectorAngle = angle;
                }
            }
            ctx.save(); ctx.translate(center, center); ctx.rotate(angle); ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(5, 10); ctx.lineTo(-5, 10); ctx.closePath(); ctx.fill(); ctx.restore();
        }

        async function startTracking() {
            if (!gostations.length) return;
            document.getElementById('rangeSelect').disabled = true;
            document.getElementById('btnGo').style.display = 'none';
            document.getElementById('btnStop').style.display = 'block';
            document.getElementById('accuracy-display').style.display = 'block';
            watchID = navigator.geolocation.watchPosition(pos => {
                myPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, ts: Date.now() };
                posHistory.push(myPos); posHistory = posHistory.filter(p => p.ts >= Date.now() - 20000);
                document.getElementById('accuracy-display').innerText = `GPS Accuracy: ±${Math.round(pos.coords.accuracy)}m`;
                document.getElementById('gps-ui').className = "gps-status " + (pos.coords.accuracy < 25 ? 'lvl4' : 'lvl3');
                processFrame();
            }, null, { enableHighAccuracy: true, maximumAge: 0 });
        }

        function stopTracking() {
            if (watchID) navigator.geolocation.clearWatch(watchID);
            document.getElementById('rangeSelect').disabled = false;
            document.getElementById('btnGo').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
            document.getElementById('accuracy-display').style.display = 'none';
            drawRadarFrame();
        }

        function processFrame() {
            if (!myPos) return;
            drawRadarFrame();
            const range = parseInt(document.getElementById('rangeSelect').value);
            const center = canvas.width / 2; const scale = center / range;
            gostations.forEach(s => {
                const R = 6371000;
                const dLat = (s.lat - myPos.lat) * Math.PI / 180, dLon = (s.lon - myPos.lon) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(myPos.lat*Math.PI/180)*Math.cos(s.lat*Math.PI/180)*Math.sin(dLon/2)**2;
                s.d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                if (s.d <= range) {
                    const xDist = (s.lon - myPos.lon) * 111320 * Math.cos(myPos.lat * Math.PI / 180);
                    const yDist = (s.lat - myPos.lat) * 110540;
                    ctx.fillStyle = "#2ecc71";
                    ctx.beginPath(); ctx.arc(center + (xDist * scale), center - (yDist * scale), 5, 0, Math.PI * 2); ctx.fill();
                }
            });
            gostations.sort((a, b) => a.d - b.d);
            document.getElementById('list-body').innerHTML = gostations.slice(0, 10).map(s => `<tr><td>${s.name}</td><td>${Math.round(s.d)}m</td></tr>`).join('');
            if (gostations[0].d < (range/5)) speak("Approaching Go Station");
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('btnPause');
            btn.innerText = isPaused ? "RESUME" : "PAUSE";
            btn.style.background = isPaused ? "#2ecc71" : "#f39c12";
            if (isPaused) exportFailures(true); else processRows();
        }

        async function handleXLSX(input) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                currentRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                const headers = currentRows[0].map(h => String(h).toLowerCase());
                currentIndices.n = headers.findIndex(h => h.includes('名稱') || h.includes('name'));
                currentIndices.a = headers.findIndex(h => h.includes('地址') || h.includes('address'));
                resumeIndex = 1; failedLog = []; isPaused = false;
                document.getElementById('btnPause').style.display = 'block';
                processRows();
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        async function geocode(addr) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=tw&q=${encodeURIComponent(addr)}`);
                const d = await r.json();
                return d.length > 0 ? { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) } : null;
            } catch (e) { return null; }
        }

        function speak(txt) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); }

        function exportFailures(isAuto = false) {
            if (failedLog.length === 0) return;
            let csv = "\uFEFFStation Name,Original Address,Attempted Cleanup\n" + failedLog.map(f => `"${f.name}","${f.address}","${f.attempt}"`).join("\n");
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = isAuto ? 'Interim_Failures.csv' : 'Final_Failures.csv'; a.click();
        }

        function exportCSV() {
            let csv = "\uFEFFStation Name,Lat,Lon\n" + gostations.map(s => `"${s.name}",${s.lat},${s.lon}`).join("\n");
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'Processed_Coordinates.csv'; a.click();
        }

        function clearAll() { localStorage.clear(); location.reload(); }

        function handleCSV(input) {
            const r = new FileReader(); r.onload = (e) => {
                const lines = e.target.result.split(/\r?\n/);
                gostations = lines.slice(1).map(l => {
                    const p = l.split(','); return p.length >= 3 ? { name: p[0].replace(/"/g, ''), lat: parseFloat(p[1]), lon: parseFloat(p[2]) } : null;
                }).filter(o => o);
                localStorage.setItem('gostation_db_v20_3', JSON.stringify(gostations)); location.reload();
            }; r.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
